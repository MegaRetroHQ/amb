apiVersion: apps/v1
kind: Deployment
metadata:
  name: amb-api
  labels:
    app: amb-api
    component: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: amb-api
      component: api
  template:
    metadata:
      labels:
        app: amb-api
        component: api
    spec:
      imagePullSecrets:
        - name: ${AMB_IMAGE_PULL_SECRET}
      containers:
        - name: api
          image: ${AMB_API_IMAGE}
          imagePullPolicy: Always
          env:
            - name: PORT
              value: "3334"
            - name: AMB_BOOTSTRAP
              value: "${AMB_BOOTSTRAP}"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: amb-secrets
                  key: DATABASE_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: amb-secrets
                  key: JWT_SECRET
          ports:
            - containerPort: 3334
              name: http
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 192Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: amb-api
  labels:
    app: amb-api
    component: api
spec:
  selector:
    app: amb-api
    component: api
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: amb-web
  labels:
    app: amb-web
    component: web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: amb-web
      component: web
  template:
    metadata:
      labels:
        app: amb-web
        component: web
    spec:
      imagePullSecrets:
        - name: ${AMB_IMAGE_PULL_SECRET}
      containers:
        - name: web
          image: ${AMB_WEB_IMAGE}
          imagePullPolicy: Always
          env:
            - name: PORT
              value: "3333"
            - name: API_URL
              value: http://amb-api:80
            - name: NODE_ENV
              value: production
            - name: HOSTNAME
              value: 0.0.0.0
          ports:
            - containerPort: 3333
              name: http
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 192Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: amb-web
  labels:
    app: amb-web
    component: web
spec:
  selector:
    app: amb-web
    component: web
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: amb-api-ingress
  annotations:
    cert-manager.io/cluster-issuer: ${AMB_CLUSTER_ISSUER}
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-body-size: 50m
    nginx.ingress.kubernetes.io/proxy-buffer-size: 16k
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  rules:
    - host: ${AMB_API_HOST}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: amb-api
                port:
                  number: 80
  tls:
    - hosts:
        - ${AMB_API_HOST}
      secretName: ${AMB_API_TLS_SECRET}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: amb-web-ingress
  annotations:
    cert-manager.io/cluster-issuer: ${AMB_CLUSTER_ISSUER}
    kubernetes.io/ingress.class: nginx
spec:
  rules:
    - host: ${AMB_WEB_HOST}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: amb-web
                port:
                  number: 80
  tls:
    - hosts:
        - ${AMB_WEB_HOST}
      secretName: ${AMB_WEB_TLS_SECRET}
