name: amb-hosting

services:
  api:
    image: docker.io/openaisdk/amb-api:latest
    pull_policy: always
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      AMB_BOOTSTRAP: ${AMB_BOOTSTRAP:-true}
      AMB_SWAGGER_ENABLED: ${AMB_SWAGGER_ENABLED:-false}
      PORT: 3334
    expose:
      - "3334"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3334/api/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12

  web:
    image: docker.io/openaisdk/amb-web-ui:latest
    pull_policy: always
    restart: unless-stopped
    environment:
      API_URL: http://api:3334
      PORT: 3333
    depends_on:
      api:
        condition: service_healthy
    expose:
      - "3333"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3333 >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12

  caddy:
    image: docker.io/library/caddy:2.10-alpine
    pull_policy: always
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    environment:
      WEB_DOMAIN: ${WEB_DOMAIN}
      API_DOMAIN: ${API_DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
